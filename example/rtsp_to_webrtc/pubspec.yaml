name: pure_dart_webrtc_rtsp_to_webrtc_example
description: >
  Synthesize an animated video with the `image` package, encode it once
  with libvpx (VP8), then fan out to (a) browsers via WebRTC and
  (b) RTSP players via RTP-over-TCP on port 8554.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.6.2

dependencies:
  pure_dart_webrtc:
    path: ../../
  args: ^2.7.0
  image: ^4.3.0

dev_dependencies:
  lints: ^5.0.0
