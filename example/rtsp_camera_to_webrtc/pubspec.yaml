name: pure_dart_webrtc_rtsp_camera_to_webrtc_example
description: >
  Pull H.264 from a real RTSP camera (rtsp://...), depacketize RTP, and
  rebroadcast the same H.264 NALUs to browsers via WebRTC.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.6.2

dependencies:
  pure_dart_webrtc:
    path: ../../
  args: ^2.7.0

dev_dependencies:
  lints: ^5.0.0
